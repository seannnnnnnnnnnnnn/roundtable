name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run check
          npm test

      - name: Build application
        run: |
          npm run build
          npm run build:server

      - name: Package macOS
        env:
          SIGNING_CSC_LINK: ${{ secrets.CSC_LINK }}
          SIGNING_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARY_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          NOTARY_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARY_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -n "$SIGNING_CSC_LINK" ]]; then
            export CSC_LINK="$SIGNING_CSC_LINK"
            export CSC_KEY_PASSWORD="$SIGNING_CSC_KEY_PASSWORD"
          fi
          if [[ -n "$NOTARY_APPLE_ID" ]]; then
            export APPLE_ID="$NOTARY_APPLE_ID"
            export APPLE_APP_SPECIFIC_PASSWORD="$NOTARY_APPLE_APP_SPECIFIC_PASSWORD"
            export APPLE_TEAM_ID="$NOTARY_APPLE_TEAM_ID"
          fi
          if [[ -n "$NOTARY_APPLE_API_KEY" ]]; then
            export APPLE_API_KEY="$NOTARY_APPLE_API_KEY"
            export APPLE_API_KEY_ID="$NOTARY_APPLE_API_KEY_ID"
            export APPLE_API_ISSUER="$NOTARY_APPLE_API_ISSUER"
          fi
          npx electron-builder --mac dmg zip --arm64 --x64 --publish never

      - name: Publish GitHub Release
        run: |
          version="$(node -p "require('./package.json').version")"
          shasum -a 256 release/Roundtable-"$version"-*.dmg release/Roundtable-"$version"-*.zip > release/SHA256SUMS.txt
          assets=(
            release/Roundtable-"$version"-*.dmg
            release/Roundtable-"$version"-*.zip
            release/Roundtable-"$version"-*.blockmap
            release/latest-mac.yml
            release/SHA256SUMS.txt
          )
          notes_file="release-notes/v$version.md"
          if gh release view "v$version" > /dev/null 2>&1; then
            gh release upload "v$version" "${assets[@]}" --clobber
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/v$version" --jq ".id")"
            if [[ -f "$notes_file" ]]; then
              jq -Rs "{body: .}" "$notes_file" |
                gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" --input - > /dev/null
            fi
          elif [[ -f "$notes_file" ]]; then
            gh release create "v$version" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Roundtable $version · macOS" \
              --notes-file "$notes_file"
          else
            gh release create "v$version" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Roundtable $version · macOS" \
              --generate-notes
          fi
